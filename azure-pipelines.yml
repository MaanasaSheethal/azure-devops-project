trigger:
- main

variables:
  imageName: demo-app

stages:
- stage: Build
  jobs:
  - job: BuildPush
    pool:
      name: default
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: 'azuredevopsproject'
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: latest

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      name: default
    steps:
    - task: KubernetesManifest@1
      inputs:
        action: deploy
        kubernetesServiceConnection: 'azuredevops-aks'
        manifests: k8s-deployment.yaml
